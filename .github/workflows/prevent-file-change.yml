---
name: prevent-file-change

"on":
  pull_request:
    types:
      - opened
      - reopened
      - edited
      - synchronize

jobs:
  prevent-file-change:
    permissions:
      pull-requests: write
    uses: sous-chefs/.github/.github/workflows/prevent-file-change.yml@6.0.0
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
