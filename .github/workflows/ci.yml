---
name: ci

"on":
  pull_request:
  push:
    branches: [main]

jobs:
  lint-unit:
    uses: sous-chefs/.github/.github/workflows/lint-unit.yml@9.0.0
    permissions:
      actions: write
      checks: write
      pull-requests: write
      statuses: write
      issues: write

  integration:
    needs: "lint-unit"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os:
          - almalinux-8
          - almalinux-9
          - almalinux-10
          - amazonlinux-2023
          - centos-stream-9
          - centos-stream-10
          - fedora-latest
          - oraclelinux-8
          - oraclelinux-9
          - oraclelinux-10
          - rockylinux-8
          - rockylinux-9
          - rockylinux-10
        suite:
          - default
          - dnf-module
        exclude:
          - os: almalinux-9
            suite: dnf-module
          - os: almalinux-10
            suite: dnf-module
          - os: amazonlinux-2023
            suite: dnf-module
          - os: centos-stream-9
            suite: dnf-module
          - os: centos-stream-10
            suite: dnf-module
          - os: fedora-latest
            suite: dnf-module
          - os: oraclelinux-9
            suite: dnf-module
          - os: oraclelinux-10
            suite: dnf-module
          - os: rockylinux-9
            suite: dnf-module
          - os: rockylinux-10
            suite: dnf-module
      fail-fast: false

    steps:
      - name: Check out code
        uses: actions/checkout@v7
      - name: Install Chef
        uses: sous-chefs/.github/.github/actions/install-workstation@9.0.0
      - name: Dokken
        run: kitchen test ${{ matrix.suite }}-${{ matrix.os }} --destroy=always
        env:
          CHEF_LICENSE: accept-no-persist
          KITCHEN_LOCAL_YAML: kitchen.dokken.yml
